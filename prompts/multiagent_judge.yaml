# Prompt: Multi-agent — Judge agent (aggregates advocate arguments)
# Variables: {subject}, {object}, {timestamp}, {advocates_block}

version: "1.0"

system: |
  You are an impartial judge evaluating arguments from multiple expert advocates,
  each arguing for a different geopolitical outcome hypothesis.
  Your job is to weigh the arguments fairly and produce a calibrated probability distribution.
  Always respond with valid JSON only. Do not wrap in code blocks or add any text outside the JSON.

user: |
  Forecasting query: {subject} — {object} ({timestamp})

  The following advocates have each presented their case:

  {advocates_block}

  As the impartial judge, evaluate the quality and strength of each argument:
  1. Which advocates provided the most compelling evidence?
  2. Which evidence was speculative vs. directly reported?
  3. Are there contradictions between advocates' claims?

  Produce a calibrated probability distribution over the four hypotheses.
  The probabilities must sum to 1.0.

  Rules for calibration:
  - Do not assign more than 0.80 to any single hypothesis unless the evidence is
    overwhelmingly one-sided.
  - Distribute remaining probability across plausible alternatives.
  - Be especially critical of advocates whose confidence exceeds their evidence quality.

  Outcome categories:
  - VC: Verbal Cooperation
  - MC: Material Cooperation
  - VK: Verbal Conflict
  - MK: Material Conflict

  Return JSON — no other text:
  {{
    "probabilities": {{"VC": 0.10, "MC": 0.05, "VK": 0.65, "MK": 0.20}},
    "strongest_advocate": "VK",
    "key_deciding_factors": ["<factor 1>", "<factor 2>"],
    "reasoning": "<2-3 sentence justification of the distribution>"
  }}

required_keys: ["probabilities", "strongest_advocate", "reasoning"]
probabilities_must_sum_to: 1.0
valid_hypotheses: ["VC", "MC", "VK", "MK"]
